<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Verify Ownership | IP Protection Platform</title>
    <link rel="stylesheet" href="css/styles.css" />

    <!--  libraries for document preview -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>
  </head>

  <body>
    <header class="app-header">
      <div class="nav-container">
        <div class="brand">
          <img src="assets/logo.png" alt="Logo" />
          <span>Intellectual Property Protection Platform</span>
        </div>

        <nav class="nav-links">
          <a href="index.html">Home</a>
          <a href="upload.html">Upload</a>
          <a href="dashboard.html">Dashboard</a>
          <a href="violations.html" class="nav-btn">Violations</a>
        </nav>
      </div>
    </header>

    <section class="page">
      <div class="card">
        <h2>Verify Intellectual Property Ownership</h2>

        <form id="verifyForm" enctype="multipart/form-data">
          <label>Select File to Verify</label>
          <input type="file" id="verifyFile" required />

          <div id="previewContainer">
            <h4>File Preview</h4>

            <img id="imagePreview" style="display:none;" />

            <audio id="audioPreview" controls style="display:none;"></audio>

            <!--  preview area -->
            <div id="textPreview"
              style="display:none;
                     white-space:pre-wrap;
                     background:#f5f5f5;
                     padding:15px;
                     border-radius:8px;
                     max-height:300px;
                     overflow:auto;">
            </div>
          </div>

          <button type="submit">Verify</button>
        </form>
      </div>

      <div class="card">
        <div id="verifyResult"></div>
      </div>
    </section>

    <footer>
      © 2026 Intellectual Property Protection Platform. All rights reserved.
    </footer>

    <script src="js/verify.js"></script>

    <!--  PREVIEW SCRIPT -->
    <script>
      const verifyFile = document.getElementById("verifyFile");

      const previewContainer = document.getElementById("previewContainer");
      const imagePreview = document.getElementById("imagePreview");
      const audioPreview = document.getElementById("audioPreview");
      const textPreview = document.getElementById("textPreview");

      verifyFile.addEventListener("change", async function () {

        const file = this.files[0];
        if (!file) return;

        imagePreview.style.display = "none";
        audioPreview.style.display = "none";
        textPreview.style.display = "none";

        previewContainer.style.display = "block";

        const fileType = file.type;
        const extension = file.name.split(".").pop().toLowerCase();

        /* IMAGE PREVIEW */
        if (fileType.startsWith("image/")) {
          const url = URL.createObjectURL(file);
          imagePreview.src = url;
          imagePreview.style.display = "block";
        }

        /* AUDIO PREVIEW */
        else if (fileType.startsWith("audio/")) {
          const url = URL.createObjectURL(file);
          audioPreview.src = url;
          audioPreview.style.display = "block";
        }

        /* TEXT / DOCUMENT PREVIEW */
        else {

          textPreview.textContent = "Loading preview...";
          textPreview.style.display = "block";

          try {

            /* TXT */
            if (extension === "txt") {
              const reader = new FileReader();

              reader.onload = function (e) {
                const content = e.target.result;

                textPreview.textContent =
                  content.substring(0, 2000) +
                  (content.length > 2000
                    ? "\n\n...Preview truncated..."
                    : "");
              };

              reader.readAsText(file);
            }

            /* DOCX */
            else if (extension === "docx") {
              const buffer = await file.arrayBuffer();

              const result = await mammoth.extractRawText({
                arrayBuffer: buffer,
              });

              const content = result.value;

              textPreview.textContent =
                content.substring(0, 2000) +
                (content.length > 2000
                  ? "\n\n...Preview truncated..."
                  : "");
            }

            /* PDF */
            else if (extension === "pdf") {
              const buffer = await file.arrayBuffer();

              const pdf = await pdfjsLib.getDocument({
                data: buffer,
              }).promise;

              let fullText = "";

              for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();

                const pageText = textContent.items
                  .map(item => item.str)
                  .join(" ");

                fullText += pageText + "\n\n";

                if (fullText.length > 2000) break;
              }

              textPreview.textContent =
                fullText.substring(0, 2000) +
                (fullText.length > 2000
                  ? "\n\n...Preview truncated..."
                  : "");
            }

            /* DOC LIMITATION */
            else if (extension === "doc") {
              textPreview.textContent =
                "Preview for .doc files is not supported in browser. Please use DOCX or PDF.";
            }

            else {
              textPreview.textContent = "Unsupported file format.";
            }

          } catch (err) {
            console.error(err);
            textPreview.textContent = "Error generating preview.";
          }
        }
      });
    </script>
  </body>
</html>
